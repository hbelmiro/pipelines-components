---
# This workflow checks if all CI checks have passed and uploads PR context for label updates.
name: CI Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

jobs:
  check_ci_status:
    runs-on: ubuntu-24.04
    permissions:
      checks: read
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: "3.14"

      - name: Check org membership
        id: membership
        run: |
          if gh api "orgs/${GITHUB_REPOSITORY_OWNER}/members/${{ github.event.pull_request.user.login }}" \
            --silent 2>/dev/null; then
            echo "is_member=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_member=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current check run ID
        id: check_run
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          ENDPOINT="repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs"
          JQ_FILTER='.check_runs[] | select(.name == "check_ci_status") | .id'
          CHECK_RUN_ID=$(gh api "${ENDPOINT}" --jq "${JQ_FILTER}" | head -1)
          echo "id=${CHECK_RUN_ID:-0}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks
        id: ci_checks
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"

          MEMBER_FLAG=""
          if [[ "${{ steps.membership.outputs.is_member }}" == "true" ]]; then
            MEMBER_FLAG="--is-member"
          fi

          uv run python3 .github/scripts/ci_checks/ci_checks.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --event-action "${{ github.event.action }}" \
            --labels "${LABELS}" \
            ${MEMBER_FLAG} \
            --check-run-id "${{ steps.check_run.outputs.id }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --delay 5 \
            --retries 10 \
            --polling-interval 5 \
            --output-dir ./pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pr
          path: pr/
