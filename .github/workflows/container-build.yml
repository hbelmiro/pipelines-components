name: Build and Push Container Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - images-ci

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kubeflow/pipelines-components

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Add images here as needed. Each entry requires:
          # - name: Image name suffix (final image: ghcr.io/kubeflow/pipelines-components-<name>)
          # - containerfile: Path to the Containerfile
          # - context: Build context directory
          - name: example
            containerfile: examples/Containerfile
            context: examples

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.containerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

      - name: Export PR image reference
        if: github.event_name == 'pull_request'
        run: |
          echo "IMAGE_REF=${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
        id: pr-image

  validate-components:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check base_image tags use :main
        run: ./.github/scripts/check_base_image_tags.sh "${{ env.IMAGE_PREFIX }}"

      - name: Override base_image values for PR validation
        run: ./.github/scripts/override_base_images.sh "$GITHUB_SHA" "${{ env.IMAGE_PREFIX }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kfp

      - name: Validate component compilation
        run: python .github/scripts/validate_components.py
